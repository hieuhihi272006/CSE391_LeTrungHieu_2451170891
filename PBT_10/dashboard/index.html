<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi API Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container py-4">

    <div class="d-flex justify-content-between mb-4">

        <h2>Dashboard</h2>

        <button
            id="refreshBtn"
            class="btn btn-primary"
        >
            Refresh All
        </button>

    </div>

    <div id="globalLoading"></div>

    <p id="loadTime"></p>

    <div class="row g-3">

        <div class="col-md-4">
            <div
                id="widget1"
                class="card h-100"
            ></div>
        </div>

        <div class="col-md-4">
            <div
                id="widget2"
                class="card h-100"
            ></div>
        </div>

        <div class="col-md-4">
            <div
                id="widget3"
                class="card h-100"
            ></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
