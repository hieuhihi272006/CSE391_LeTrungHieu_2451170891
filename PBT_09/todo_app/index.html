<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="todo rounded-5 position-absolute top-50 start-50 bg-light p-4">
      <div>
        <h1 class="fw-bolder">Todo App</h1>
        <p class="text-muted">Manage your tasks efficiently</p>
      </div>

      <div class="my-4 container px-0">
        <div class="row g-2">
          <div class="col-10">
            <input
              placeholder="What needs to be done?"
              type="text"
              class="inputEvent col-9 rounded-4 w-100 p-2 ps-3 fs-5"
              style="height: 60px"
              id="text"
            />
          </div>
          <div class="col-2">
            <button
              class="btnAdd btn bg-primary w-100 text-light fw-bolder rounded-4"
              style="height: 60px"
              id="btn__add"
            >
              Add
            </button>
          </div>
        </div>
      </div>

      <div class="list-group bg-light" id="list__event"></div>

      <div
        class="d-flex justify-content-between mt-4 text-muted container__btn"
      >
        <p class="fs-4"><span id="count">0</span> item</p>
        <div id="list__btn">
          <button class="btn text-muted fs-4 rounded-4 active" id="btn__all">
            All
          </button>
          <button class="btn text-muted fs-4 rounded-4" id="btn__active">
            Active
          </button>
          <button class="btn text-muted fs-4 rounded-4" id="btn__completed">
            Completed
          </button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
