<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">MyShop</div>

      <button class="hamburger">☰</button>

      <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Deals</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <h2>Filters</h2>

        <div class="filter-group">
          <h3>Category</h3>
          <label><input type="checkbox" /> Laptop</label>
          <label><input type="checkbox" /> Phone</label>
          <label><input type="checkbox" /> Headphone</label>
          <label><input type="checkbox" /> Watch</label>
        </div>

        <div class="filter-group">
          <h3>Price</h3>
          <label><input type="checkbox" /> Under $50</label>
          <label><input type="checkbox" /> $50 - $100</label>
          <label><input type="checkbox" /> $100 - $200</label>
          <label><input type="checkbox" /> Over $200</label>
        </div>
      </aside>

      <main class="main">
        <h1 class="title">Product List</h1>

        <section class="products">
          <div class="card">
            <img src="https://picsum.photos/500/300?random=1" alt="Product" />
            <div class="card-body">
              <h2>Product A</h2>
              <p class="price">$120</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=2" alt="Product" />
            <div class="card-body">
              <h2>Product B</h2>
              <p class="price">$80</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=3" alt="Product" />
            <div class="card-body">
              <h2>Product C</h2>
              <p class="price">$150</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=4" alt="Product" />
            <div class="card-body">
              <h2>Product D</h2>
              <p class="price">$60</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=5" alt="Product" />
            <div class="card-body">
              <h2>Product E</h2>
              <p class="price">$200</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=6" alt="Product" />
            <div class="card-body">
              <h2>Product F</h2>
              <p class="price">$90</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=7" alt="Product" />
            <div class="card-body">
              <h2>Product G</h2>
              <p class="price">$110</p>
              <button class="buy">Buy</button>
            </div>
          </div>

          <div class="card">
            <img src="https://picsum.photos/500/300?random=8" alt="Product" />
            <div class="card-body">
              <h2>Product H</h2>
              <p class="price">$75</p>
              <button class="buy">Buy</button>
            </div>
          </div>
        </section>
      </main>

      <aside class="ads">
        <h2>Ads</h2>
        <img src="https://picsum.photos/300/600?random=20" alt="Ads" />
        <p>Big Discount Today</p>
      </aside>
    </div>

    <footer class="footer">
      <p>© 2026 MyShop. All rights reserved.</p>
    </footer>
  </body>
</html>
