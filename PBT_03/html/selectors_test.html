<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Selectors Test</title>

    <style>
      * {
        font-family: Arial;
      }

      h1 {
        color: red;
      }
      .price {
        color: green;
        font-weight: bold;
      }

      #app header {
        border: 2px solid blue;
        padding: 10px;
      }

      nav a:first-child {
        background: yellow;
      }

      .product.featured h2 {
        color: purple;
      }

      article > p {
        border: 1px dashed gray;
      }

      a[href="/"] {
        text-decoration: underline;
      }

      .top-bar.dark h1 {
        background: black;
        color: white;
        padding: 5px;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <header class="top-bar dark">
        <h1>ShopTLU</h1>
        <nav>
          <a href="/" class="active">Home</a>
          <a href="/products">Products</a>
          <a href="/about">About</a>
        </nav>
      </header>

      <main>
        <article class="product">
          <h2>iPhone 16</h2>
          <p class="price">25.990.000đ</p>
          <p>Mô tả sản phẩm...</p>
        </article>

        <article class="product featured">
          <h2>MacBook Pro</h2>
          <p class="price">45.990.000đ</p>
          <p>Mô tả sản phẩm...</p>
        </article>
      </main>
    </div>
  </body>
</html>
