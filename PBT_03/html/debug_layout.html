<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug Layout</title>
    <link rel="stylesheet" href="../css/debug_layout.css" />
  </head>
  <body>
    <h2>❌ Layout bị vỡ (content-box mặc định)</h2>
    <div class="container broken">
      <div class="sidebar">Sidebar (broken)</div>
      <div class="content">Content (broken)</div>
    </div>

    <hr />

    <h2>✅ Fix 1: Dùng box-sizing: border-box</h2>
    <div class="container fix-borderbox">
      <div class="sidebar">Sidebar (border-box)</div>
      <div class="content">Content (border-box)</div>
    </div>

    <hr />

    <h2>✅ Fix 2: Không dùng border-box (tính lại width)</h2>
    <div class="container fix-no-borderbox">
      <div class="sidebar">Sidebar (recalc width)</div>
      <div class="content">Content (recalc width)</div>
    </div>
  </body>
</html>
